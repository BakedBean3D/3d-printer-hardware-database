    and KiCad). Thickness 1.6 mm is standard but not explicitly annotated in the drawings. Mounting: Holes
    are isolated (non-plated) with a ~2.2 mm keep-out ring. Drilled Ø4.3 mm (M4 clearance) but Duet''s
    own guides specify M3 screws. Width is 134 mm, length 140 mm -- the commonly cited "144x96" figure
