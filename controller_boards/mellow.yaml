# Mounting dimensions for parametric CAD. null = unknown (do not assume 0).
- id: mellow_fly_sht36
  name: Fly-SHT36 (v1)
  manufacturer: Mellow
  category: toolhead_can
  pcb_length_mm: 51.27
  pcb_width_mm: 36.26
  pcb_thickness_mm: 1.6
  mount_screw: M3
  mount_hole_dia_mm: 3.2
  mount_pattern: linear
  mount_pitch_x_mm: 43.84
  mount_pitch_y_mm: 0.0
  mount_hole_count: 2
  mount_holes_xy: null
  mount_inset_from_edge_mm: null
  standoff_height_mm: 5
  component_height_top_mm: null
  connector_notes: ''
  sources:
  - https://mellow.klipper.cn/en/docs/ProductDoc/ToolBoard/fly-sht36/sht36/
  - https://github.com/Mellow-3D/Klipper-CAN-Toolboards/blob/main/FLY-SHT36/STEP%20File/36.step
  confidence: high
  notes: 'Confidence high — Tier-1 (vendor CAD/drawing). Outline + 43.84 mm spacing confirmed by drawing
    AND STEP. Thickness 1.6 mm nominal. Mounting: ONLY 2 mounting holes, collinear, spaced 43.84 mm (confirmed
    by both the dimension drawing and STEP). Mounts via two "ear" tabs on a printed bracket. Does NOT
    use the NEMA17 31 mm pattern (that assumption is false for the SHT36 -- only the SHT42 uses 31x31).
    Exact hole XY relative to the PCB corner not extracted; use the 43.84 mm spacing. Source: https://mellow.klipper.cn/en/docs/ProductDoc/ToolBoard/fly-sht36/sht36/'
