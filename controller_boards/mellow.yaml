  component_height_top_mm: null
  connector_notes: STM32 RepRapFirmware-capable mainboard. 4x stepper driver sockets (X/Y/Z/E, TMC SilentStepStick),
    ST-LINK header, BL-Touch, PT100, EXP1 LCD, USB. RRF-E3 is superseded by Fly-E3-V2.
  sources:
  - https://github.com/Mellow-3D/FLY-RRF-E3/blob/master/Hardware/Sizes.svg
  confidence: medium
  notes: 'Board outline 100.838 x 70.358 mm read from official Hardware/Sizes.svg dimensional drawing
    = high confidence on size. Mounting holes form an IRREGULAR (non-rectangular) pattern. Coordinates
    derived from drawing callouts (bottom-left origin): top-left hole 20.574mm from left / 3.556mm from
    top -> (20.574, 66.802); top-right hole 18.542mm from right (=82.296 from left) / 9.652mm from top
    -> (82.296, 60.706); a hole 34.290mm from left / 2.032mm from bottom -> (34.290, 2.032). A 4th (bottom-right)
    hole is visible but not explicitly dimensioned. Left-side chain dims 31.750/29.210mm reference the
    lower-left hole vertically. Overall medium confidence because holes are not on a clean grid and the
    SVG is a drawing, not a KiCad file. Verify hole positions against a physical board before final mount
    print. (raw hole coords from source: (20.574, 66.802), (82.296, 60.706), (34.290, 2.032), bottom-right
    hole not dimensioned)'
