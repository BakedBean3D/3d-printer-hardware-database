- id: stepstick_tmc2209
  name: TMC2209 StepStick / SilentStepStick driver module
  manufacturer: Generic/various (Watterott SilentStepStick, BTT, FYSETC, etc.)
  category: driver_module
  pcb_length_mm: 20.32
  pcb_width_mm: 15.24
  pcb_thickness_mm: 1.6
  mount_screw: null
  mount_hole_dia_mm: null
  mount_pattern: none(header-mounted)
  mount_pitch_x_mm: 15.24
  mount_pitch_y_mm: 2.54
  mount_hole_count: 0
  mount_holes_xy: []
  mount_inset_from_edge_mm: null
  standoff_height_mm: null
  component_height_top_mm: null
  connector_notes: 2x 1x8 0.1in male pin headers (plugs into stepper-driver socket).
  sources:
  - https://www.mouser.com/pdfDocs/TMC2209_SilentStepStick_Rev110.pdf
  - https://reprap.org/wiki/TMC2209
  - https://www.pololu.com/product/1182
  confidence: high
  notes: 'Confidence high — Tier-1 (vendor CAD/drawing). 15.24 x 20.32 mm is the industry-standard StepStick/Pololu
    carrier size, corroborated by the TMC2209 SilentStepStick datasheet and the BTT MAX31865 manual (which
    states it copies the stepper-driver footprint at exactly this size). Header-mounted only; no screw
    holes. Top heatsink height varies. Mounting: Standard Pololu/StepStick footprint 0.6 in x 0.8 in.
    Mounts via two 1x8 (16-pin total) 0.1 in (2.54 mm) male headers, NOT screws. The two header rows sit
    0.6 in (15.24 mm) apart, each row spanning 7 x 2.54 = 17.78 mm. TMC2208 plug-in module is the SAME
    footprint. Source: https://www.mouser.com/pdfDocs/TMC2209_SilentStepStick_Rev110.pdf'
